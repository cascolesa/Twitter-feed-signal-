name: Automated Macro Signal Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Up Python Engine
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      # NOTE: Place your live web scrapers / X list pull routines right here 
      # so that tracker.csv actually receives fresh live data before processing.

      - name: Step 1 - Execute Macro Structural Filter
        run: python tracker.py

      - name: Step 2 - Formulate Systematic Trade Dispatches
        run: python Report.py

      - name: Step 3 - Commit System State to Prevent Frozen Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Safely stage tracking logs to prevent duplicate message loops
          git add sent_signals.txt scorecard.csv || true
          git commit -m "chore: push automated system state tracking history [skip ci]" || true
          git push origin main || true
