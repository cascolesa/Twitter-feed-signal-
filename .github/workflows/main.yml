name: Cloud X Signal Tracker

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install yfinance twifork

      - name: Inspect Tracker Targets and Handles
        run: |
          echo "=== Searching for Account Targets inside tracker.py ==="
          grep -n -E "user|target|account|list|handle|array|\[" tracker.py | head -n 40
          echo "=== Checking Script Footer ==="
          tail -n 20 tracker.py

      - name: Run Tracker Engine
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
        run: python tracker.py

      - name: Save Tracking Changes
        run: |
          git config --global user.name "Cloud Automation Engine"
          git config --global user.email "actions@github.com"
          git add tracker.csv scorecard.csv
          git commit -m "Automated trade matrix update" || exit 0
          git push

      - name: Display Top Analyst Signal Report
        run: python Report.py
