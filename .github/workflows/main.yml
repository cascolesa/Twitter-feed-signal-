name: Systematic Quant Engine Pipeline

on:
  schedule:
    - cron: '0 */4 * * 1-5' # Automatically runs every 4 hours, Monday to Friday
  workflow_dispatch: # Allows you to press a button and test it manually anytime

jobs:
  run-quant-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests beautifulsoup4 feedparser lxml

      - name: Execute Stage 1 - Data Ingestion
        run: python fetch_feed.py

      - name: Execute Stage 2 - Pre-Processing & Meta-Tagging
        run: python model_generator.py

      - name: Execute Stage 3 - Sentiment Scoring Engine
        run: python sentiment_engine.py

      - name: Execute Stage 4 & 5 - Cross-Asset Forecast & Dispatch
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python forecast_messenger.py
