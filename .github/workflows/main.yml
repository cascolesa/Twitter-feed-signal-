name: Automated Macro Signal Update

on:
  schedule:
    # This triggers the code automatically every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to manually trigger it with a button click

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python Engine
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Network Tools
        run: pip install requests numpy

      - name: Step 1 - Filter and Analyze Macro Data
        run: python tracker.py

      - name: Step 2 - Synthesize and Push Report to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python Report.py
