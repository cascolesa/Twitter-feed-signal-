name: Systematic Global Macro Trade Engine

on:
  schedule:
    - cron: '0 */6 * * *' # Executes automatically every 6 hours
  workflow_dispatch: # Allows manual trigger button via GitHub UI

jobs:
  run-macro-engine:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Grants runner explicit security rights to push state updates

    steps:
      - name: Checkout Repository Codebase
        uses: actions/checkout@v4

      - name: Initialize Stable Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Network Diagnostics & DNS Cache Flush
        run: |
          echo "=== SYSTEM DNS LOOKUP INSPECTION ==="
          cat /etc/resolv.conf || true
          
          echo "=== TESTING DIRECT OUTBOUND ROUTING TO X ==="
          curl -I --connect-timeout 5 https://twitter.com || true
          
          echo "=== RECONFIGURING DNS OVERRIDES ==="
          # Overwrite runner DNS configuration with highly reliable public options if localized mapping is broken
          sudo sh -c 'echo "nameserver 1.1.1.1\nnameserver 8.8.8.8" > /etc/resolv.conf'
          
          echo "=== FLUSHING SYSTEM SYSTEMD RESOLVER CACHE ==="
          sudo resolvectl flush-caches || true

      - name: Execute Live Multi-Source Ingestion Pipeline
        env:
          TWITTER_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          # Force clean runtime environment bypassing standard virtual machine proxy walls
          http_proxy: ""
          https_proxy: ""
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
        run: |
          echo "=== STARTING DIRECT AUTHORIZED INGESTION ==="
          python fetch_feed.py
          
          # Compute file row count safely to prevent silent 0-item matrix execution
          ROW_COUNT=$(wc -l < tracker.csv 2>/dev/null || echo 0)
          echo "DEBUG: tracker.csv line count detected at: $ROW_COUNT"
          
          if [ "$ROW_COUNT" -le 1 ]; then
            echo "::error title=Ingest Warning::Upstream authenticated stream returned an empty array. Inspecting file buffer."
            echo "=== RAW TRACKER.CSV HEAD ==="
            cat tracker.csv
          fi

      - name: Execute Quantamental Regime Vector Scoring
        run: |
          echo "=== PROCESSING FACTOR MATRICES ==="
          python tracker.py
          echo "=== SCORECARD ARRAYS PREVIEW ==="
          cat scorecard.csv || echo "scorecard.csv target missing from runner directory"

      - name: Formulate Trade Thesis and Dispatch Telegram Alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "=== PACKAGING HTML DISPATCH ==="
          python Report.py

      - name: Secure State History Write-Back Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage tracking assets if updated
          git add tracker.csv scorecard.csv
          
          # Only commit and push if new files or logs changed to avoid zero-byte commit loop failures
          git diff --quiet && git diff --cached --quiet || (git commit -m "sys: automated quantamental matrix state update [skip ci]" && git push)
