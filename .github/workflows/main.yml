name: Cloud X Signal Tracker

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6 # Updated to v6 to fully clear Node 24 runtime warnings

      - name: Set Up Python
        uses: actions/setup-python@v6 # Updated to v6 for full native Node 24 support
        with:
          python-version: '3.10' # Explicitly locks the runtime environment to fix the missing PATH warning

      - name: Install Libraries
        run: pip install git+https://github.com/unclecode/twikit.git yfinance


      - name: Run Script
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
        run: python tracker.py

      - name: Save Tracking Changes
        run: |
          git config --global user.name "Cloud Automation Engine"
          git config --global user.email "actions@github.com"
          git add tracker.csv
          git commit -m "Automated trade matrix update" || exit 0
          git push
            - name: 🏆 Display Top Analyst Signal Report
        run: |
          if [ -f "scorecard.csv" ]; then
            TOP_ANALYST=$(tail -n +2 scorecard.csv | head -n 1 | cut -d',' -f1)
            echo "=================================================="
            echo "🔥 CURRENT LEADERBOARD WIN-RATE CHAMPION: @$TOP_ANALYST"
            echo "=================================================="
            if [ -f "tracker.csv" ]; then
              echo "📋 LATEST VALID FINANCIAL RESEARCH FROM THIS ACCOUNT:"
              python3 -c "
import csv, sys, html
with open('tracker.csv', mode='r', encoding='utf-8') as f:
    reader = csv.reader(f)
    header = next(reader)
    # Find positions safely regardless of layout changes
    idx_acct = header.index('Account') if 'Account' in header else 1
    idx_date = header.index('Date_Logged') if 'Date_Logged' in header else 2
    idx_text = header.index('Tweet_Text') if 'Tweet_Text' in header else 3
    idx_tick = header.index('Ticker') if 'Ticker' in header else 4
    idx_entr = header.index('Entry_Price') if 'Entry_Price' in header else 5
    
    matching_rows = [r for r in reader if len(r) > max(idx_acct, idx_tick) and r[idx_acct].lower() == '$TOP_ANALYST'.lower()]
    if matching_rows:
        latest = matching_rows[-1]
        clean_text = html.unescape(latest[idx_text].replace('\n', ' '))
        print(f'• Date: {latest[idx_date]}')
        print(f'• Asset: {latest[idx_tick]}')
        print(f'• Entry: {latest[idx_entr]}')
        print(f'• Summary Text: {clean_text}')
    else:
        print('No recent signals found for this account.')
              "
            else:
              echo "No historical trade logs found in database."
            fi
            echo "=================================================="
          else
            echo "No scorecard data computed yet."
          fi

