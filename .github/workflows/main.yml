name: Systematic Global Macro Trade Engine

on:
  schedule:
    - cron: '0 */6 * * *' # Executes automatically every 6 hours
  workflow_dispatch: # Allows manual trigger button via GitHub UI

jobs:
  run-macro-engine:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Grants runner explicit security rights to push state updates

    steps:
      - name: Checkout Repository Codebase
        uses: actions/checkout@v4

      - name: Initialize Stable Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Live Multi-Source Ingestion Pipeline
        run: python fetch_feed.py

      - name: Execute Quantamental Regime Vector Scoring
        run: python tracker.py

      - name: Formulate Trade Thesis and Dispatch Telegram Alert
        run: python Report.py

      - name: Secure State History Write-Back Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          # Stage tracking assets if updated
          git add tracker.csv scorecard.csv
          
          # Only commit and push if new files or logs changed to avoid zero-byte commit loop failures
          if ! git diff --cached --quiet; then
            git commit -m "sys: automated quantamental matrix state update [skip ci]"
            git push
            print("State logs safely pushed back to repository storage.")
          else
            print("No new delta change detected. State remains static.")
          fi
