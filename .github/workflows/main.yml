name: Cloud X Signal Tracker

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install twikit yfinance

      - name: Run Script
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
        run: python tracker.py

      - name: Save Tracking Changes
        run: |
          git config --global user.name "Cloud Automation Engine"
          git config --global user.email "actions@github.com"
          git add tracker.csv
          git commit -m "Automated trade matrix update" || exit 0
          git push
