name: Cloud X Signal Tracker

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install yfinance twifork

      - name: Extract Processing Code
        run: |
          echo "=== Code Loop lines 175-245 ==="
          sed -n '175,245p' tracker.py

      - name: Run Tracker Engine
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
        run: python tracker.py
